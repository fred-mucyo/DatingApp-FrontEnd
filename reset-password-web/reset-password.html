<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: #f9fafb; margin: 0; }
      .container { max-width: 420px; margin: 48px auto; background: white; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px; }
      h1 { font-size: 20px; margin: 0 0 12px; color: #111827; }
      p { color: #374151; font-size: 14px; line-height: 1.4; }
      label { display: block; margin-top: 12px; font-size: 13px; color: #111827; font-weight: 600; }
      input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: 15px; }
      button { width: 100%; margin-top: 14px; padding: 12px; border: 0; border-radius: 12px; background: #f97316; color: white; font-size: 15px; font-weight: 700; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { color: #b91c1c; font-weight: 600; margin-top: 10px; }
      .success { color: #065f46; font-weight: 700; margin-top: 10px; }
      .small { font-size: 12px; color: #6b7280; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Reset password</h1>
      <p id="status">Opening recovery session…</p>

      <div id="request" style="display:none;">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" />
        <button id="send">Send reset email</button>
        <div id="requestMessage" class="error" style="display:none;"></div>
        <div id="requestSuccess" class="success" style="display:none;"></div>
        <div class="small">We’ll email you a link to reset your password.</div>
      </div>

      <div id="form" style="display:none;">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" />

        <label for="confirm">Confirm new password</label>
        <input id="confirm" type="password" autocomplete="new-password" />

        <button id="submit">Update password</button>
        <div id="message" class="error" style="display:none;"></div>
        <div id="success" class="success" style="display:none;"></div>
        <div class="small">You can close this page after updating your password.</div>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      // PUBLIC values (safe in client). These must match your project.
      const SUPABASE_URL = 'https://bkoeyolarhjwozlijrpw.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrb2V5b2xhcmhqd296bGlqcnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYxNTE3MjksImV4cCI6MjA4MTcyNzcyOX0.Jxm060ao1b6dG1uE134_eimlzfwPAOAGXE4RIajWJ8k';

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          // Use implicit flow for a hosted reset page so the email link contains
          // #access_token/#refresh_token and does not require a PKCE code_verifier.
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false,
          flowType: 'implicit',
        },
      });

      const statusEl = document.getElementById('status');
      const formEl = document.getElementById('form');
      const passwordEl = document.getElementById('password');
      const confirmEl = document.getElementById('confirm');
      const submitEl = document.getElementById('submit');
      const msgEl = document.getElementById('message');
      const successEl = document.getElementById('success');

      const requestEl = document.getElementById('request');
      const emailEl = document.getElementById('email');
      const sendEl = document.getElementById('send');
      const requestMsgEl = document.getElementById('requestMessage');
      const requestSuccessEl = document.getElementById('requestSuccess');

      const setError = (text) => {
        msgEl.textContent = text;
        msgEl.style.display = 'block';
        successEl.style.display = 'none';
      };

      const setSuccess = (text) => {
        successEl.textContent = text;
        successEl.style.display = 'block';
        msgEl.style.display = 'none';
      };

      const parseHashParams = () => {
        const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
        const params = new URLSearchParams(hash);
        const out = {};
        for (const [k, v] of params.entries()) out[k] = v;
        return out;
      };

      const parseQueryParams = () => {
        const out = {};
        const url = new URL(window.location.href);
        for (const [k, v] of url.searchParams.entries()) out[k] = v;
        return out;
      };

      const init = async () => {
        try {
          const url = new URL(window.location.href);
          const query = parseQueryParams();

          const linkError = query.error_description || query.error_code || query.error;
          if (linkError) {
            statusEl.textContent = 'Reset link error. Please request a new password reset email.';
            requestEl.style.display = 'block';
            showRequestError(String(linkError));
            return;
          }

          const code = url.searchParams.get('code');

          if (code) {
            statusEl.textContent =
              'This reset link uses PKCE and cannot be completed here. Please request a new reset email using the form below (this page uses an implicit link that works in any browser).';
            requestEl.style.display = 'block';
            return;
          }

          const hash = parseHashParams();
          const type = hash.type;
          const access_token = hash.access_token;
          const refresh_token = hash.refresh_token;

          if (type !== 'recovery' || !access_token || !refresh_token) {
            statusEl.textContent = 'Request a password reset email.';
            requestEl.style.display = 'block';
            return;
          }

          const { error: sessErr } = await supabase.auth.setSession({ access_token, refresh_token });
          if (sessErr) {
            statusEl.textContent = 'Failed to open recovery session. Please request a new reset email.';
            requestEl.style.display = 'block';
            return;
          }

          statusEl.textContent = 'Enter a new password below.';
          formEl.style.display = 'block';
        } catch {
          statusEl.textContent = 'Request a password reset email.';
          requestEl.style.display = 'block';
        }
      };

      const showRequestError = (text) => {
        requestMsgEl.textContent = text;
        requestMsgEl.style.display = 'block';
        requestSuccessEl.style.display = 'none';
      };

      const showRequestSuccess = (text) => {
        requestSuccessEl.textContent = text;
        requestSuccessEl.style.display = 'block';
        requestMsgEl.style.display = 'none';
      };

      sendEl.addEventListener('click', async () => {
        requestMsgEl.style.display = 'none';
        requestSuccessEl.style.display = 'none';

        const email = (emailEl.value || '').trim();
        if (!email || !email.includes('@')) {
          showRequestError('Please enter a valid email address.');
          return;
        }

        sendEl.disabled = true;
        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}/reset-password.html`,
          });
          if (error) {
            showRequestError(error.message || 'Failed to send reset email.');
            return;
          }
          showRequestSuccess('Reset email sent. Please check your inbox.');
        } catch (e) {
          showRequestError(e?.message || 'Failed to send reset email.');
        } finally {
          sendEl.disabled = false;
        }
      });

      submitEl.addEventListener('click', async () => {
        msgEl.style.display = 'none';
        successEl.style.display = 'none';

        const password = passwordEl.value || '';
        const confirm = confirmEl.value || '';

        if (password.length < 6) {
          setError('Password must be at least 6 characters.');
          return;
        }
        if (password !== confirm) {
          setError('Passwords do not match.');
          return;
        }

        submitEl.disabled = true;
        try {
          const { error } = await supabase.auth.updateUser({ password });
          if (error) {
            setError(error.message || 'Failed to update password.');
            return;
          }
          setSuccess('Password updated successfully. You can now log in with your new password.');
        } catch (e) {
          setError(e?.message || 'Failed to update password.');
        } finally {
          submitEl.disabled = false;
        }
      });

      init();
    </script>
  </body>
</html>
